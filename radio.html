<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#090b0f">
        <meta name="robots" content="noindex, nofollow, noarchive">
        <title>Radio / jimfund</title>
        <link rel="icon" href="favicon.svg" type="image/svg+xml">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&amp;family=IBM+Plex+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
        <link rel="stylesheet" href="site.css">
        <link rel="stylesheet" href="radio-window.css">
    </head>
    <body class="radio-window-body">
        <main class="radio-window">
            <div class="radio-window__masthead">
                <span>Jimfund radio</span>
                <span>Detached receiver</span>
            </div>
            <section class="radio-player" data-radio data-radio-window aria-label="Radio">
    <script type="application/json" data-radio-tracks>[{"id": "qAiPsZRZNOI", "title": "The Highwaymen Live in Las Vegas"}, {"id": "6hUkyKBsGtQ", "title": "Paradise Circus"}, {"id": "6G0NFv3738s", "title": "Stories"}, {"id": "iyGpSvj1DGo", "title": "Code Geass Stories Extended 1 hour"}, {"id": "HIavGD36vtg", "title": "Neutral Milk Hotel - Little Birds"}, {"id": "kL5tG4W5wsE", "title": "Bob Dylan - A Hard Rain\u0027s A-Gonna Fall (Fort Collins, 1976)"}]</script>
    <button class="radio-player__launch" type="button" data-radio-launch aria-expanded="false" aria-controls="radio-panel">
        <span class="radio-player__kicker">Radio</span>
        <span class="radio-player__title" data-radio-title>The Highwaymen Live in Las Vegas</span>
        <span class="radio-player__launch-command" data-radio-launch-command>Turn on</span>
    </button>
    <div class="radio-player__panel" id="radio-panel" data-radio-panel hidden>
        <div class="radio-player__controls">
            <span class="radio-player__status" data-radio-status aria-live="polite"></span>
            <button class="radio-player__button" type="button" data-radio-prev aria-label="Previous video">Prev</button>
            <button class="radio-player__button radio-player__button--primary" type="button" data-radio-toggle aria-label="Stop radio">Stop</button>
            <button class="radio-player__button" type="button" data-radio-next aria-label="Next video">Next</button>
            <button class="radio-player__button" type="button" data-radio-detach aria-label="Close detached radio">Close</button>
        </div>
        <div class="radio-player__frame-shell" aria-live="polite">
            <iframe class="radio-player__frame" data-radio-frame title="Jimfund radio" loading="eager" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
    </div>
</section>
            <p class="radio-window__note">The receiver may be closed without notifying the archive.</p>
        </main>
        <script src="radio.js" defer></script>
    </body>
</html>
