<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Time Horizon Projection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="chart-area" aria-label="Interactive time horizon projection">
        <div class="chart-header">
          <div>
            <p class="eyebrow">Jimfund model</p>
            <h1>AI time horizon</h1>
          </div>
          <button id="resetButton" type="button">Reset</button>
        </div>

        <div class="chart-wrap">
          <canvas id="projectionChart" aria-label="Projected AI time horizon over time"></canvas>
          <div id="tooltip" class="tooltip" hidden></div>
        </div>

        <div class="threshold-clock" aria-live="polite">
          <span class="threshold-clock__label">Projected ASI</span>
          <output id="thresholdDate" class="threshold-clock__value">Calculating...</output>
        </div>

      </section>

      <aside class="controls" aria-label="Projection parameters">
        <h2>Parameters</h2>

        <label>
          <span>Initial TH, hours</span>
          <input id="startHours" type="number" min="1" max="1000" step="0.1" value="26.883333">
        </label>

        <label>
          <span>Initial doubling, months</span>
          <input id="doublingMonths" type="number" min="0.1" max="24" step="0.01" value="2.69">
        </label>

        <label class="share-control">
          <span>Algorithmic share, %</span>
          <input id="algorithmicShare" type="range" min="0" max="100" step="1" value="50">
          <output id="algorithmicShareOut">50%</output>
        </label>

        <label>
          <span>Cap, hours</span>
          <input id="capHours" type="number" min="20000" max="1000000" step="1000" value="100000">
        </label>

        <label>
          <span>Utility exponent</span>
          <input id="utilityExponent" type="number" min="0" max="2" step="0.05" value="1">
        </label>

        <h3>Difficulty Anchors</h3>
        <div class="anchor-grid">
          <label>
            <span>27h</span>
            <input id="difficulty27" type="number" min="0.0001" max="5" step="0.01" value="0.95">
          </label>
          <label>
            <span>500h</span>
            <input id="difficulty500" type="number" min="0.0001" max="5" step="0.01" value="0.40">
          </label>
          <label>
            <span>2000h</span>
            <input id="difficulty2000" type="number" min="0.0001" max="5" step="0.01" value="0.05">
          </label>
          <label>
            <span>10000h</span>
            <input id="difficulty10000" type="number" min="0.000001" max="5" step="0.001" value="0.001">
          </label>
        </div>

      </aside>

    </main>

    <script src="app.js"></script>
  </body>
</html>
