name: Update market calendar

on:
  schedule:
    - cron: "17 5 1 12 *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-calendar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out published site
        uses: actions/checkout@v4

      - name: Generate calendar
        run: python3 market_calendar_update.py --output market-calendar.json

      - name: Commit updated calendar
        run: |
          if git diff --quiet -- market-calendar.json; then
            echo "Market calendar is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-calendar.json
          git commit -m "Update market calendar"
          git pull --rebase
          git push
