name: Update site health

on:
  schedule:
    - cron: "17 5 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-site-health
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out published site
        uses: actions/checkout@v4

      - name: Probe public dependencies
        run: python3 site_health.py --playlist radio-playlist.json --output site-health.json

      - name: Commit observation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site-health.json
          if git diff --cached --quiet; then
            echo "Site health is unchanged."
            exit 0
          fi
          git commit -m "Update site health"
          git pull --rebase
          git push
